<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { margin:0; background:#000; color:white; font-family:sans-serif; }
#video { width:100vw; height:100vh; object-fit:cover; }
button { position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
padding:15px 40px; font-size:18px; border:none; border-radius:30px; background:#fbc531; }
#result { position:fixed; bottom:0; width:100%; height:65%; background:white; color:black; padding:15px; overflow:auto; display:none; }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<button id="capture">SCAN</button>

<div id="result">
<div id="out">Processing...</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>

const WOLFRAM_APP_ID = "";
const GEMINI_API_KEY = "";

const video = document.getElementById("video");

async function startCamera(){
    try{
        const stream = await navigator.mediaDevices.getUserMedia({
            video:{ facingMode:"environment" }
        });
        video.srcObject = stream;
    }catch(e){
        alert("Camera allow karo");
    }
}
startCamera();

document.getElementById("capture").onclick = async () => {

    const out = document.getElementById("out");
    const resultBox = document.getElementById("result");
    resultBox.style.display = "block";

    out.innerText = "📸 Capturing...";

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 800;
    canvas.height = 600;
    ctx.drawImage(video, 0, 0, 800, 600);

    const img = canvas.toDataURL("image/png");

    // 🧠 OCR
    out.innerText = "🧠 Reading...";
    const { data:{ text } } = await Tesseract.recognize(img, "eng");

    if(!text.trim()){
        out.innerText = "❌ Text detect nahi hua";
        return;
    }

    out.innerText = "📄 " + text + "\n\n⏳ Solving...";

    let answer = "Not found";

    // 🔢 Wolfram
    try{
        const res = await fetch(
        `https://api.allorigins.win/raw?url=https://api.wolframalpha.com/v2/query?appid=${WOLFRAM_APP_ID}&input=${encodeURIComponent(text)}&output=json`
        );

        const data = await res.json();

        if(data.queryresult.success){
            data.queryresult.pods.forEach(pod=>{
                if(pod.primary || pod.title==="Result"){
                    answer = pod.subpods[0].plaintext;
                }
            });
        }

    }catch(e){
        answer = "Wolfram error";
    }

    out.innerText += "\n\n✅ Answer: " + answer + "\n\n🧠 Explaining...";

    let explanation = "Explain failed";

    // 🤖 Gemini
    try{
        const res2 = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
        {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
                contents:[{
                    parts:[{
                        text:`Explain step-by-step in Hinglish:\nQuestion: ${text}\nAnswer: ${answer}`
                    }]
                }]
            })
        });

        const data2 = await res2.json();

        if(data2.candidates){
            explanation = data2.candidates[0].content.parts[0].text;
        }

    }catch(e){
        explanation = "Gemini error";
    }

    out.innerText =
    "📄 Question:\n" + text +
    "\n\n✅ Answer:\n" + answer +
    "\n\n🧠 Explanation:\n" + explanation;
};

</script>

</body>
</html>
