<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Math Solver</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { margin:0; background:#000; color:white; font-family:sans-serif; }
#video { width:100vw; height:100vh; object-fit:cover; }
.controls { position:fixed; bottom:30px; width:100%; text-align:center; }
button { padding:15px 40px; font-size:18px; border-radius:30px; border:none; background:#fbc531; }
#result { position:fixed; bottom:0; left:0; width:100%; height:70%; background:white; color:black; padding:20px; overflow:auto; display:none; }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div class="controls">
<button id="capture">SOLVE</button>
</div>

<div id="result">
<div id="out">Processing...</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>

// 🔴 API KEYS YAHAN DAALO
const WOLFRAM_APP_ID = "7J3PH4ATLU";  
const GEMINI_API_KEY = "AIzaSyC4clKtpDk8dr9jkN_3N4fFOxVf20EvYjs";  

const video = document.getElementById('video');

async function startCamera(){
    try{
        const stream = await navigator.mediaDevices.getUserMedia({
            video:{ facingMode:"environment" }
        });
        video.srcObject = stream;
    }catch(e){
        alert("Camera allow karo");
    }
}
startCamera();

document.getElementById("capture").onclick = async () => {

    const resultBox = document.getElementById("result");
    const output = document.getElementById("out");
    resultBox.style.display = "block";

    output.innerText = "📸 Capturing...";

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // 🔥 optimize size
    canvas.width = 800;
    canvas.height = 600;
    ctx.drawImage(video, 0, 0, 800, 600);

    const image = canvas.toDataURL("image/png");

    // 🧠 OCR
    output.innerText = "🧠 Reading question...";
    const { data:{ text } } = await Tesseract.recognize(image, 'eng');

    if(!text.trim()){
        output.innerText = "❌ Text detect nahi hua";
        return;
    }

    output.innerText = "📄 Question:\n" + text + "\n\n⏳ Solving...";

    let answer = "Not found";

    // 🔢 Wolfram solve
    try{
        const res = await fetch(
            `https://api.wolframalpha.com/v2/query?appid=${WOLFRAM_APP_ID}&input=${encodeURIComponent(text)}&output=json`
        );

        const data = await res.json();

        if(data.queryresult.success){
            data.queryresult.pods.forEach(pod=>{
                if(pod.primary || pod.title === "Result"){
                    answer = pod.subpods[0].plaintext;
                }
            });
        }
    }catch(e){
        answer = "Wolfram error";
    }

    output.innerText += "\n\n✅ Answer:\n" + answer + "\n\n🧠 Generating explanation...";

    let explanation = "Explain nahi ho paya";

    // 🤖 Gemini explanation
    try{
        const res2 = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
        {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
                contents:[{
                    parts:[{
                        text:`Explain step-by-step in easy Hinglish:\nQuestion: ${text}\nAnswer: ${answer}`
                    }]
                }]
            })
        });

        const data2 = await res2.json();

        if(data2.candidates){
            explanation = data2.candidates[0].content.parts[0].text;
        }

    }catch(e){
        explanation = "Gemini error";
    }

    // 📊 Final Output
    output.innerText =
    "📄 Question:\n" + text +
    "\n\n✅ Answer:\n" + answer +
    "\n\n🧠 Explanation:\n" + explanation;
};

</script>

</body>
</html>
