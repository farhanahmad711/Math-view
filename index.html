<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Math Solver Pro UI</title>
<script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
}

/* GRID BACKGROUND */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:linear-gradient(#ddd 1px, transparent 1px),
linear-gradient(90deg,#ddd 1px,transparent 1px);
background-size:30px 30px;
z-index:-1;
}

/* CAMERA */
video{
width:100%;
height:60vh;
object-fit:cover;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

/* BUTTON */
.scan-btn{
position:fixed;
bottom:90px;
left:50%;
transform:translateX(-50%);
background:#ff4757;
color:#fff;
border:none;
padding:15px 30px;
border-radius:50px;
font-size:18px;
box-shadow:0 10px 20px rgba(255,71,87,0.4);
}

/* INPUT */
.input-box{
position:fixed;
bottom:20px;
width:90%;
left:5%;
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:30px;
border:1px solid #ccc;
}

/* RESULT SHEET */
#sheet{
position:fixed;
bottom:-100%;
width:100%;
height:60%;
background:#fff;
border-radius:25px 25px 0 0;
padding:20px;
transition:0.4s;
overflow:auto;
}

#sheet.active{
bottom:0;
}

.title{
font-weight:bold;
color:#ff4757;
margin-bottom:10px;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<button class="scan-btn" onclick="scan()">SCAN</button>

<div class="input-box">
<input id="q" placeholder="Question likho...">
<button onclick="solveText()">Solve</button>
</div>

<div id="sheet">
<div class="title">Solution</div>
<div id="result">Processing...</div>
</div>

<script>
const API_KEY="AIzaSyAKI9TVGv1K3J6XIpi9mE4z-Xyo4-6VB84";

const video=document.getElementById("video");
const result=document.getElementById("result");
const sheet=document.getElementById("sheet");

// CAMERA
navigator.mediaDevices.getUserMedia({video:true})
.then(s=>video.srcObject=s)
.catch(()=>result.innerText="Camera error");

// FAST SOLVE
function fast(q){
try{
if(/^[0-9+\-*/(). xX=]+$/.test(q)){
return eval(q.replace(/x/g,"*"));
}
}catch{}
return null;
}

// TEXT
async function solveText(){
let q=document.getElementById("q").value;
if(!q)return;

sheet.classList.add("active");
result.innerText="Solving...";

let f=fast(q);
if(f){
result.innerText="Answer: "+f;
return;
}

solveAI(q);
}

// SCAN
async function scan(){
sheet.classList.add("active");
result.innerText="Scanning...";

let canvas=document.createElement("canvas");
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
canvas.getContext("2d").drawImage(video,0,0);

let {data:{text}}=await Tesseract.recognize(canvas.toDataURL(),'eng');

if(!text.trim()){
result.innerText="Text nahi mila";
return;
}

let f=fast(text);
if(f){
result.innerText="Answer: "+f;
return;
}

solveAI(text);
}

// AI
async function solveAI(q){
try{
let res=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:"Solve step by step:\n"+q}]}]
})
});

let data=await res.json();

if(data.candidates){
result.innerText=data.candidates[0].content.parts[0].text;
}else{
result.innerText="No response";
}

}catch{
result.innerText="Error";
}
}
</script>

</body>
</html>
