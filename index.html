<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NCERT Math Solver Pro</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Arial', sans-serif; overflow: hidden; color: white; }
        #video { width: 100vw; height: 100vh; object-fit: cover; }
        
        /* Photomath Style UI */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; z-index: 10;
        }
        .scan-box {
            width: 85%; height: 180px; border: 3px solid #fbc531;
            border-radius: 15px; box-shadow: 0 0 0 5000px rgba(0,0,0,0.7);
            position: relative;
        }
        .scan-line {
            position: absolute; width: 100%; height: 3px; background: #fbc531;
            top: 0; animation: scan 2s infinite ease-in-out;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        /* Solve Button */
        .controls { position: fixed; bottom: 40px; width: 100%; text-align: center; z-index: 20; }
        .solve-btn {
            background: #fbc531; color: #000; border: none; padding: 18px 60px;
            border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Result Panel */
        #result {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 75%;
            background: white; color: #333; border-radius: 30px 30px 0 0;
            transition: 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67); z-index: 30; padding: 25px; overflow-y: auto;
        }
        #result.open { bottom: 0; }
        .close-btn { width: 50px; height: 6px; background: #ddd; margin: 0 auto 20px; border-radius: 10px; cursor: pointer; }
        #solution-text { font-size: 17px; line-height: 1.8; }
    </style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<div class="overlay">
    <div class="scan-box"><div class="scan-line"></div></div>
    <p style="margin-top:20px; color:#fbc531; font-weight:bold;">NCERT MATH QUESTION RAKHEIN</p>
</div>

<div class="controls">
    <button class="solve-btn" id="solveBtn">SOLVE NOW</button>
</div>

<div id="result">
    <div class="close-btn" onclick="document.getElementById('result').classList.remove('open')"></div>
    <div id="solution-text">Solution load ho raha hai...</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    // Nayi API Key: AIzaSyC4clKtpDk8dr9jkN_3N4fFOxVf20EvYjs
    const API_KEY = "AIzaSyC4clKtpDk8dr9jkN_3N4fFOxVf20EvYjs"; 
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const resultDiv = document.getElementById('result');
    const output = document.getElementById('solution-text');

    // Start Camera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => video.srcObject = stream)
        .catch(() => alert("Kripya HTTPS link use karein aur Camera allow karein."));

    document.getElementById('solveBtn').addEventListener('click', async () => {
        resultDiv.classList.add('open');
        output.innerHTML = "<b>NCERT Math Logic lagaya ja raha hai...</b>";

        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        
        const imageData = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Solve this NCERT Math problem step-by-step. Identify the Class and Chapter. Ignore any non-math text. Explain in simple Hinglish (Hindi+English mix). Use proper math symbols." },
                            { inline_data: { mime_type: "image/jpeg", data: imageData } }
                        ]
                    }]
                })
            });

            const data = await res.json();
            
            if (data.error) {
                output.innerText = "Error: API Key block ho gayi hai. Nayi key generate karein.";
            } else {
                output.innerText = data.candidates[0].content.parts[0].text;
            }
        } catch (e) {
            output.innerText = "Network Error! Internet connection check karein.";
        }
    });
</script>

</body>
</html>
