<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Solver Pro - AI</title>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        
        #video {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
        }

        /* Scan Overlay */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; z-index: 5;
        }

        .scan-window {
            width: 80%; height: 140px;
            border: 3px solid #00d2ff; border-radius: 20px;
            box-shadow: 0 0 0 5000px rgba(0,0,0,0.7);
            position: relative;
            transition: all 0.3s;
        }

        /* Scanning Animation Line */
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: #00d2ff; box-shadow: 0 0 15px #00d2ff;
            top: 0; animation: scanMove 2s infinite linear;
            display: none;
        }

        @keyframes scanMove {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .hint-text {
            position: absolute; top: -40px; width: 100%;
            text-align: center; font-size: 14px; font-weight: 500;
            color: #00d2ff; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Controls */
        .footer {
            position: fixed; bottom: 50px; width: 100%;
            display: flex; justify-content: center; z-index: 10;
        }

        .scan-btn {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white; border: none; padding: 15px 45px;
            border-radius: 30px; font-size: 16px; font-weight: bold;
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.4);
            cursor: pointer;
        }

        /* Result Sheet */
        #result-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%;
            background: #ffffff; border-radius: 30px 30px 0 0;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            padding: 30px 20px; z-index: 20; color: #333; overflow-y: auto;
        }

        #result-sheet.active { bottom: 0; }

        .handle { width: 50px; height: 6px; background: #ddd; border-radius: 10px; margin: -10px auto 20px; }
        .sol-header { font-size: 22px; font-weight: 800; color: #3a7bd5; margin-bottom: 15px; }
        #solution-content { font-size: 16px; line-height: 1.7; white-space: pre-wrap; }

        canvas { display: none; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>

    <div class="overlay">
        <div class="scan-window" id="window">
            <div class="hint-text">Sawal ko Box mein rakhein</div>
            <div class="scan-line" id="line"></div>
        </div>
    </div>

    <div class="footer">
        <button class="scan-btn" onclick="processMath()">SOLVE NOW</button>
    </div>

    <div id="result-sheet">
        <div class="handle" onclick="closeSheet()"></div>
        <div class="sol-header">Step-by-Step Solution</div>
        <div id="solution-content">Taiyari ho rahi hai...</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const API_KEY = "AIzaSyCQErzyiwOxfAfhi9E5vzMSDLvFxM5jZ60"; // Use secure methods for production
        const video = document.getElementById('video');
        const sheet = document.getElementById('result-sheet');
        const content = document.getElementById('solution-content');
        const scanLine = document.getElementById('line');

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", focusMode: "continuous" } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera access chahiye!");
            }
        }
        startApp();

        async function processMath() {
            sheet.classList.add('active');
            content.innerText = "Scanning text...";
            scanLine.style.display = "block";

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // --- SMART CROPPING LOGIC ---
            const scale = video.videoWidth / window.innerWidth;
            const win = document.getElementById('window').getBoundingClientRect();
            
            // Frame ki dimensions calculate karna
            canvas.width = win.width * scale;
            canvas.height = win.height * scale;

            ctx.drawImage(video, 
                win.left * scale, win.top * scale, win.width * scale, win.height * scale, 
                0, 0, canvas.width, canvas.height
            );

            Tesseract.recognize(canvas.toDataURL(), 'eng').then(({ data: { text } }) => {
                scanLine.style.display = "none";
                if(text.trim().length > 2) {
                    solve(text);
                } else {
                    content.innerText = "Sawal saaf nahi dikh raha. Thoda paas laayein.";
                }
            });
        }

        async function solve(query) {
            content.innerHTML = "<b>Sawal:</b> " + query + "<br><br><i>Gemini AI soch raha hai...</i>";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Solve this math problem step-by-step in Hindi and English mix: " + query }] }]
                    })
                });
                const data = await res.json();
                content.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                content.innerText = "Error: Internet check karein.";
            }
        }

        function closeSheet() { sheet.classList.remove('active'); }
    </script>
</body>
</html>
