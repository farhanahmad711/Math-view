<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NCERT Math Solver</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        #video { width: 100vw; height: 100vh; object-fit: cover; background: #222; }
        
        /* Photomath Style Yellow Box */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .box { width: 85%; height: 220px; border: 4px solid #fbc531; border-radius: 15px; box-shadow: 0 0 0 5000px rgba(0,0,0,0.7); position: relative; }
        .line { position: absolute; width: 100%; height: 2px; background: #fbc531; top: 0; animation: scan 2s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .controls { position: fixed; bottom: 50px; width: 100%; text-align: center; z-index: 100; }
        .solve-btn { background: #fbc531; color: #000; border: none; padding: 20px 60px; border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        #result-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; height: 75%; background: white; color: black; border-radius: 30px 30px 0 0; transition: 0.4s; padding: 25px; overflow-y: auto; z-index: 200; }
        #result-sheet.active { bottom: 0; }
        .close-bar { width: 50px; height: 6px; background: #ddd; margin: 0 auto 20px; border-radius: 10px; }
    </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>

<div class="overlay">
    <div class="box"><div class="line"></div></div>
    <p style="margin-top:20px; color:#fbc531; font-weight:bold;">NCERT QUESTION SCAN KAREIN</p>
</div>

<div class="controls">
    <button class="solve-btn" id="solveBtn">SOLVE NOW</button>
</div>

<div id="result-sheet">
    <div class="close-bar" onclick="document.getElementById('result-sheet').classList.remove('active')"></div>
    <div id="solution-out" style="font-size:18px; line-height:1.6;">Soluton load ho raha hai...</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    // Zaroori: Agar API Key block dikhaye toh AI Studio se naya banayein
    const API_KEY = "7J3PH4ATLU"; 
    const video = document.getElementById('video');
    const out = document.getElementById('solution-out');
    const sheet = document.getElementById('result-sheet');

    // CAMERA START LOGIC (Modified)
    async function initCamera() {
        const constraints = {
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
        };
        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
        } catch (e) {
            alert("Camera Error: Kya aapne HTTPS use kiya hai? Browser settings mein camera allow karein.");
        }
    }
    initCamera();

    document.getElementById('solveBtn').onclick = async () => {
        sheet.classList.add('active');
        out.innerHTML = "<b>AI photo ko process kar raha hai...</b>";

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        
        const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Solve this NCERT math problem from the image. Be a teacher, explain step-by-step in easy Hinglish." },
                            { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                        ]
                    }]
                })
            });
            const data = await response.json();
            out.innerText = data.candidates[0].content.parts[0].text;
        } catch (err) {
            out.innerText = "Error: API Key limit ya Network issue. Ek baar refresh karein.";
        }
    };
</script>
</body>
</html>
