<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Solver Pro</title>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        
        #video {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover; background: #000;
        }

        /* Photomath Style Overlay */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; z-index: 5;
        }

        .scan-window {
            width: 85%; height: 120px;
            border: 2.5px solid #ff4757; border-radius: 15px;
            box-shadow: 0 0 0 5000px rgba(0,0,0,0.6); /* Darkens outside the box */
            position: relative;
        }

        .scan-window::before {
            content: ""; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 20px;
        }

        .hint-text {
            position: absolute; bottom: -45px; width: 100%;
            text-align: center; color: #fff; font-size: 14px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* Controls */
        .footer {
            position: fixed; bottom: 40px; width: 100%;
            display: flex; flex-direction: column; align-items: center; z-index: 10;
        }

        .scan-btn {
            background: #ff4757; color: white; border: none;
            padding: 18px 50px; border-radius: 50px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4);
            transition: transform 0.1s;
        }

        .scan-btn:active { transform: scale(0.95); }

        /* Result Sheet */
        #result-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 60%;
            background: #fff; border-radius: 25px 25px 0 0;
            transition: bottom 0.4s cubic-bezier(0.36, 1.1, 0.5, 1);
            padding: 25px; z-index: 20; color: #1a1a1a; overflow-y: auto;
        }

        #result-sheet.active { bottom: 0; }

        .handle {
            width: 40px; height: 5px; background: #e0e0e0;
            border-radius: 10px; margin: -10px auto 20px; cursor: pointer;
        }

        .sol-header { color: #ff4757; font-size: 20px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        #solution-content { font-size: 16px; line-height: 1.6; white-space: pre-wrap; color: #333; }

        canvas { display: none; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>

    <div class="overlay">
        <div class="scan-window">
            <div class="hint-text">Sawal ko frame ke andar rakhein</div>
        </div>
    </div>

    <div class="footer">
        <button class="scan-btn" onclick="processMath()">SCAN & SOLVE</button>
    </div>

    <div id="result-sheet">
        <div class="handle" onclick="closeSheet()"></div>
        <div class="sol-header">Solution</div>
        <div id="solution-content">Processing...</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const API_KEY = "AIzaSyCQErzyiwOxfAfhi9E5vzMSDLvFxM5jZ60";
        const video = document.getElementById('video');
        const sheet = document.getElementById('result-sheet');
        const content = document.getElementById('solution-content');

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Camera Error:", err);
                // Error message layout mein hi dikhane ke liye
                content.innerText = "Camera nahi chal raha. Kripya GitHub Pages (HTTPS) ka use karein.";
                sheet.classList.add('active');
            }
        }

        startApp();

        async function processMath() {
            content.innerText = "Scanning question...";
            sheet.classList.add('active');

            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            Tesseract.recognize(canvas.toDataURL(), 'eng').then(({ data: { text } }) => {
                if(text.trim().length > 0) {
                    solve(text);
                } else {
                    content.innerText = "Text nahi mila. Koshish karein ki sawal saaf ho.";
                }
            });
        }

        async function solve(query) {
            content.innerText = "Gemini AI solve kar raha hai...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Solve this math problem step-by-step: " + query }] }]
                    })
                });
                const data = await res.json();
                content.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                content.innerText = "Connection error. Internet check karein.";
            }
        }

        function closeSheet() { sheet.classList.remove('active'); }
    </script>
</body>
</html>
