<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Math Solver Phase 1</title>
<style>
body { font-family: sans-serif; padding:20px; background:#111; color:white; }
input, button { padding:10px; font-size:16px; }
button { background:#fbc531; border:none; margin-left:10px; }
#output { margin-top:20px; white-space:pre-line; }
</style>
</head>

<body>

<h2>Math Solver 🔢</h2>

<input id="question" placeholder="Enter question (e.g. 2x+5=15)" size="30">
<button onclick="solve()">Solve</button>

<div id="output"></div>

<script>

const WOLFRAM_APP_ID = "7J3PH4ATLU"; // 🔴 डालो
const GEMINI_API_KEY = ""; /AIzaSyC4clKtpDk8dr9jkN_3N4fFOxVf20EvYjs/ 🔴 डालो

async function solve(){

    const q = document.getElementById("question").value;
    const out = document.getElementById("output");

    if(!q){
        out.innerText = "❌ Question likho";
        return;
    }

    out.innerText = "⏳ Solving...";

    let answer = "Not found";

    // 🔢 Wolfram
    try{
        const res = await fetch(
        `https://api.allorigins.win/raw?url=https://api.wolframalpha.com/v2/query?appid=${WOLFRAM_APP_ID}&input=${encodeURIComponent(q)}&output=json`
        );

        const data = await res.json();

        if(data.queryresult.success){
            data.queryresult.pods.forEach(pod=>{
                if(pod.primary || pod.title==="Result"){
                    answer = pod.subpods[0].plaintext;
                }
            });
        }

    }catch(e){
        answer = "Wolfram error";
    }

    out.innerText = "✅ Answer: " + answer + "\n\n🧠 Explaining...";

    let explanation = "Explain failed";

    // 🤖 Gemini
    try{
        const res2 = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
        {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
                contents:[{
                    parts:[{
                        text:`Solve step-by-step in easy Hinglish:\n${q}\nAnswer: ${answer}`
                    }]
                }]
            })
        });

        const data2 = await res2.json();

        if(data2.candidates){
            explanation = data2.candidates[0].content.parts[0].text;
        }

    }catch(e){
        explanation = "Gemini error";
    }

    out.innerText =
    "📄 Question: " + q +
    "\n\n✅ Answer: " + answer +
    "\n\n🧠 Explanation:\n" + explanation;
}

</script>

</body>
</html>
